<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RBF Planning V95</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --blue: #1b2e58; --yellow: #f9c311; --success: #10b981; --danger: #ef4444; --bg: #f4f7f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; }
        
        header { background: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--yellow); position: sticky; top: 0; z-index: 1000; }
        .logo img { height: 35px; }
        .btn-logout { background: var(--danger); color: white; border: none; padding: 8px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        .admin-nav { background: white; padding: 10px; display: flex; gap: 10px; justify-content: center; border-bottom: 1px solid #ddd; }
        .btn-top { background: var(--blue); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .week-nav { display: flex; align-items: center; justify-content: center; gap: 20px; padding: 10px; background: white; }
        .wk-btn { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #ccc; background: white; cursor: pointer; }

        .table-container { padding: 10px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 900px; border-radius: 10px; overflow: hidden; }
        th { background: var(--blue); color: white; padding: 12px; font-size: 12px; border: 1px solid #334466; }
        td { border: 1px solid #e2e8f0; padding: 5px; vertical-align: top; width: 18%; }
        
        .user-cell { background: #f8fafc; font-weight: bold; color: var(--blue); text-align: center; width: 130px; border-right: 3px solid var(--yellow); font-size: 11px; }
        .slot { font-size: 11px; padding: 8px; margin-bottom: 4px; border-radius: 6px; background: #fff; border: 1px solid #ddd; cursor: pointer; min-height: 35px; overflow: hidden; text-overflow: ellipsis; }

        .card-day { background: white; margin: 10px; padding: 15px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .mission-box { padding: 10px; border-radius: 8px; margin-bottom: 10px; color: white; font-weight: bold; }
        
        .pointage-zone { display: flex; align-items: center; gap: 10px; background: #f1f5f9; padding: 10px; border-radius: 10px; margin-top: 10px; flex-wrap: wrap; }
        .p-input { padding: 8px; border-radius: 5px; border: 1px solid #ccc; width: 80px; }
        .comment-input { flex: 1; min-width: 200px; padding: 8px; border-radius: 5px; border: 1px solid #ccc; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 5000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: white; width: 90%; max-width: 450px; padding: 20px; border-radius: 15px; }
        .color-opt { width: 30px; height: 30px; border-radius: 50%; display: inline-block; cursor: pointer; margin-right: 5px; border: 2px solid transparent; }
        .color-opt.active { border-color: black; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="logo"><img src="logo.png"></div>
    <div id="u-ctrl" class="hidden"><button class="btn-logout" onclick="logout()">CHANGER COMPTE</button></div>
</header>

<div id="login-screen" style="padding: 40px 20px; text-align: center;">
    <div style="max-width: 400px; margin: auto;">
        <button class="btn-top" style="width:100%; margin-bottom:10px; padding:20px;" onclick="askCode('admin')">💼 BUREAU / ADMIN</button>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn-top" onclick="askCode('damien')">🚛 CHAUFFEUR INTERNE</button>
            <button class="btn-top" onclick="askCode('cedric')">🚛 CÉDRIC</button>
            <button class="btn-top" onclick="askCode('jadiel')">👷 JADIEL</button>
            <button class="btn-top" onclick="askCode('nicola')">👷 NICOLA</button>
        </div>
    </div>
</div>

<div id="app-content" class="hidden">
    <div class="admin-nav hidden" id="admin-tools">
        <button class="btn-top" style="background:var(--success);" onclick="toggleDash()">📊 RÉCAPITULATIF HEURES</button>
    </div>

    <div class="week-nav">
        <button class="wk-btn" onclick="changeWeek(-1)">‹</button>
        <div id="wk-disp" style="font-weight:bold; color:var(--blue); text-align:center;"></div>
        <button class="wk-btn" onclick="changeWeek(1)">›</button>
    </div>

    <div id="v-admin" class="table-container hidden">
        <table>
            <thead><tr><th>PERSONNEL</th><th id="h0">LUN</th><th id="h1">MAR</th><th id="h2">MER</th><th id="h3">JEU</th><th id="h4">VEN</th></tr></thead>
            <tbody id="b-admin"></tbody>
        </table>
    </div>
    <div id="v-user" class="hidden"></div>
</div>

<div id="editor-overlay" class="modal-overlay">
    <div class="modal-box">
        <h3 style="margin-top:0;">Programmer la mission</h3>
        <input type="text" id="e-chantier" placeholder="Nom du chantier" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
        <textarea id="e-mission" placeholder="Détails de la mission" style="width:100%; padding:10px; height:60px; margin-bottom:10px; box-sizing:border-box;"></textarea>
        
        <div style="margin-bottom:15px;">
            <label style="display:block; font-size:12px; margin-bottom:5px;">Couleur d'affichage :</label>
            <div id="color-picker">
                <div class="color-opt" style="background:#3b82f6;" data-c="#3b82f6"></div>
                <div class="color-opt" style="background:#ef4444;" data-c="#ef4444"></div>
                <div class="color-opt" style="background:#10b981;" data-c="#10b981"></div>
                <div class="color-opt" style="background:#f59e0b;" data-c="#f59e0b"></div>
                <div class="color-opt" style="background:#8b5cf6;" data-c="#8b5cf6"></div>
            </div>
        </div>

        <div id="section-depot" style="background:#fff5f5; padding:10px; border-radius:10px; margin-bottom:15px; border:1px solid #fecaca;">
            <textarea id="e-matos" placeholder="Matériel pour le dépôt..." style="width:100%; padding:5px; height:40px; margin-bottom:5px; box-sizing:border-box;"></textarea>
            <label style="font-size:12px; font-weight:bold; color:var(--danger); cursor:pointer;">
                <input type="checkbox" id="e-send"> 📧 ENVOYER AU DÉPÔT PAR MAIL
            </label>
        </div>

        <button class="btn-top" style="width:100%; padding:15px;" onclick="saveAll()">ENREGISTRER</button>
        <button onclick="closeEd()" style="width:100%; border:none; background:none; color:#666; margin-top:10px; cursor:pointer;">Annuler</button>
    </div>
</div>

<script>
    const SERVICE_ID = "service_1j5bpwf", PUBLIC_KEY = "q2ZFtf0rJf0I0jLbq", T_DEPOT = "template_8gqnnh7";
    firebase.initializeApp({ databaseURL: "https://rbf-transport-default-rtdb.europe-west1.firebasedatabase.app/" });
    const db = firebase.database(); emailjs.init(PUBLIC_KEY);

    let curU = localStorage.getItem('rbf_u'), curW = 16, curY = 2026, curK = null, selCol = "#3b82f6";
    const users = [{id:'damien',n:'CHAUFFEUR INTERNE'},{id:'cedric',n:'CÉDRIC'},{id:'jadiel',n:'JADIEL'},{id:'nicola',n:'NICOLA'}];

    function askCode(u) {
        let codes = {admin:'2026', damien:'1111', cedric:'2222', jadiel:'3333', nicola:'4444'};
        let p = prompt("Code d'accès ?");
        if(p === codes[u]) { localStorage.setItem('rbf_u', u); location.reload(); }
    }
    function logout() { localStorage.removeItem('rbf_u'); location.reload(); }

    document.querySelectorAll('.color-opt').forEach(opt => {
        opt.onclick = () => {
            document.querySelectorAll('.color-opt').forEach(o => o.classList.remove('active'));
            opt.classList.add('active'); selCol = opt.dataset.c;
        };
    });

    function getDates(w, y) {
        let d = new Date(y, 0, 1 + (w - 1) * 7);
        let day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6:1);
        let mon = new Date(d.setDate(diff));
        let res = []; for(let i=0; i<5; i++) {
            let n = new Date(mon); n.setDate(mon.getDate()+i);
            res.push(n.toISOString().split('T')[0]);
        }
        return res;
    }

    function render() {
        const dates = getDates(curW, curY);
        document.getElementById('wk-disp').innerHTML = `AVRIL ${curY}<br>SEMAINE ${curW}`;
        dates.forEach((d, i) => document.getElementById('h'+i).innerHTML = new Date(d).toLocaleDateString('fr-FR',{weekday:'short',day:'2-digit'}).toUpperCase());

        if(curU === 'admin') {
            document.getElementById('v-admin').classList.remove('hidden');
            let h = ""; users.forEach(u => {
                h += `<tr><td class="user-cell">${u.n}</td>`;
                dates.forEach(date => {
                    h += `<td>`;
                    for(let s=1; s<=3; s++) {
                        let k = `${date}_${u.id}_s${s}`, dta = window.planData ? window.planData[k] : null;
                        let st = dta ? `background:${dta.col||'#3b82f6'}; color:white; border:none;` : "";
                        h += `<div class="slot" style="${st}" onclick="openEd('${k}')">${dta ? dta.chantier : '...'}</div>`;
                    }
                    h += `</td>`;
                });
                h += `</tr>`;
            });
            document.getElementById('b-admin').innerHTML = h;
        } else {
            document.getElementById('v-user').classList.remove('hidden');
            let h = ""; dates.forEach(date => {
                let mH = ""; for(let s=1; s<=3; s++) {
                    let dta = window.planData ? window.planData[`${date}_${curU}_s${s}`] : null;
                    if(dta) mH += `<div class="mission-box" style="background:${dta.col||'#3b82f6'}">📍 ${dta.chantier.toUpperCase()} : ${dta.mission}</div>`;
                }
                let pt = (window.pointData && window.pointData[date+'_'+curU]) ? window.pointData[date+'_'+curU] : {s:'', e:'', p:'45', r:''};
                h += `<div class="card-day">
                    <b>${new Date(date).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric'})}</b>
                    ${mH || '<div style="font-size:12px; color:#999; margin:5px 0;">Aucune mission.</div>'}
                    <div class="pointage-zone">
                        <input type="time" class="p-input" value="${pt.s}" onchange="saveP('${date}','s',this.value)">
                        <input type="time" class="p-input" value="${pt.e}" onchange="saveP('${date}','e',this.value)">
                        <input type="text" class="comment-input" placeholder="Rapport / Commentaire" value="${pt.r||''}" onblur="saveP('${date}','r',this.value)">
                    </div></div>`;
            });
            document.getElementById('v-user').innerHTML = h;
        }
    }

    function openEd(k) {
        curK = k; let d = window.planData ? window.planData[k] : null;
        document.getElementById('e-chantier').value = d?.chantier || "";
        document.getElementById('e-mission').value = d?.mission || "";
        document.getElementById('e-matos').value = d?.matos || "";
        selCol = d?.col || "#3b82f6";
        document.querySelectorAll('.color-opt').forEach(o => o.classList.toggle('active', o.dataset.c === selCol));
        document.getElementById('editor-overlay').style.display = 'flex';
    }

    function saveAll() {
        let ch = document.getElementById('e-chantier').value, mi = document.getElementById('e-mission').value, ma = document.getElementById('e-matos').value;
        db.ref('v95_plan/'+curK).set({chantier:ch, mission:mi, matos:ma, col:selCol}).then(() => {
            if(document.getElementById('e-send').checked && ma) {
                emailjs.send(SERVICE_ID, T_DEPOT, { message: `MATÉRIEL BESOIN - ${ch.toUpperCase()}\n${ma}`, user_id: curK.split('_')[1] });
            }
            closeEd();
        });
    }

    function closeEd() { document.getElementById('editor-overlay').style.display = 'none'; }
    function saveP(date, f, v) { db.ref(`v95_point/${date}_${curU}/${f}`).set(v); }
    function changeWeek(v) { curW += v; render(); }

    if(curU) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app-content').classList.remove('hidden');
        document.getElementById('u-ctrl').classList.remove('hidden');
        if(curU === 'admin') document.getElementById('admin-tools').classList.remove('hidden');
        db.ref('v95_plan').on('value', s => { window.planData = s.val(); render(); });
        db.ref('v95_point').on('value', s => { window.pointData = s.val(); render(); });
    }
</script>
</body>
</html>
