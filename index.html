<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RBF Planning V104</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #1b2e58; --yellow: #f9c311; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: #334155; }
        
        /* Elements Communs */
        header { background: white; padding: 10px 20px; display: grid; grid-template-columns: 80px 1fr 80px; align-items: center; border-bottom: 4px solid var(--yellow); position: sticky; top: 0; z-index: 1000; }
        .btn-action { background: var(--blue); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 11px; }
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); display: none; align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(4px); }
        .box { background: white; padding: 20px; border-radius: 20px; width: 92%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
        
        /* Tableaux et Planning */
        .table-container { padding: 10px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 900px; border-radius: 12px; overflow: hidden; }
        th { background: var(--blue); color: white; padding: 12px; font-size: 11px; }
        td { border: 1px solid #f1f5f9; padding: 5px; vertical-align: top; }
        .user-cell { background: #fdfdfd; font-weight: bold; position: sticky; left: 0; border-right: 3px solid var(--yellow) !important; text-align: center; }
        
        .slot { font-size: 10px; padding: 8px; margin-bottom: 4px; border-radius: 8px; background: #f9fafb; border: 1px dashed #cbd5e1; cursor: pointer; min-height: 40px; }
        .filled { background: #eff6ff !important; border: 1px solid #3b82f6 !important; font-weight: 600; }
        .is-to-depot { border-left: 5px solid var(--success) !important; }
        .is-ferie { background: #fee2e2 !important; }

        /* Formulaires */
        input, textarea, select { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-family: inherit; }
        .pause-row { display: grid; grid-template-columns: 1fr 1fr 40px; gap: 8px; background: #f8fafc; padding: 8px; border-radius: 10px; margin-bottom: 8px; }
        
        .recap-card { border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative; }
        .total-badge { position: absolute; top: 15px; right: 15px; background: var(--blue); color: white; padding: 4px 8px; border-radius: 6px; font-weight: bold; }

        .hidden { display: none !important; }
        @media (max-width: 600px) { .header-title { font-size: 11px; } }
    </style>
</head>
<body>

<header>
    <div><img src="logo.png" height="35"></div>
    <div style="text-align:center; font-weight:900; color:var(--blue);">PLANNING & HEURES RBF</div>
    <div id="logout-btn" class="hidden"><button class="btn-action" style="background:var(--danger)" onclick="logout()">QUITTER</button></div>
</header>

<div id="login-screen" style="display:flex; height:80vh; align-items:center; justify-content:center;">
    <div style="width:90%; max-width:350px; text-align:center;">
        <img src="logo.png" width="150" style="margin-bottom:20px;">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <button class="btn-action" style="grid-column:span 2; padding:15px;" onclick="askCode('admin')">ADMIN / BUREAU</button>
            <button class="btn-action" style="grid-column:span 2; background:var(--success); padding:15px;" onclick="askCode('depot')">DÉPÔT / PRÉPA</button>
            <button class="btn-action" onclick="askCode('interne')">INTERNE</button>
            <button class="btn-action" onclick="askCode('cedric')">CÉDRIC</button>
            <button class="btn-action" onclick="askCode('jadiel')">JADIEL</button>
            <button class="btn-action" onclick="askCode('nicola')">NICOLA</button>
        </div>
    </div>
</div>

<div id="app-content" class="hidden">
    <div id="admin-tools" class="hidden" style="padding:10px; background:white; border-bottom:1px solid #ddd; display:flex; gap:10px;">
        <input type="text" id="search-input" placeholder="🔍 Chantier..." oninput="applySearch()" style="margin:0; flex:1;">
        <button class="btn-action" onclick="showFullHistory()">HISTO</button>
        <button class="btn-action" style="background:var(--success)" onclick="viewAllPointages()">📊 HEURES</button>
    </div>

    <button id="btn-show-pointer" class="hidden" onclick="openPointage()" style="width:calc(100% - 20px); margin:10px; padding:15px; background:var(--success); color:white; border:none; border-radius:10px; font-weight:bold;">⏰ POINTER MA JOURNÉE (LIBRE)</button>
    
    <div style="display:flex; justify-content:center; align-items:center; gap:20px; padding:15px; background:white;">
        <button class="btn-action" onclick="changeWeek(-1)">◀</button>
        <span id="wk-disp" style="font-weight:bold; color:var(--blue);"></span>
        <button class="btn-action" onclick="changeWeek(1)">▶</button>
    </div>

    <div id="v-admin" class="table-container hidden">
        <table>
            <thead><tr><th style="width:100px;">NOM</th><th id="h0">LUN</th><th id="h1">MAR</th><th id="h2">MER</th><th id="h3">JEU</th><th id="h4">VEN</th></tr></thead>
            <tbody id="b-admin"></tbody>
        </table>
    </div>
    <div id="v-driver" class="hidden"></div>
</div>

<div id="p-modal" class="overlay">
    <div class="box">
        <h3 style="margin:0 0 15px 0;">Saisir mes Heures</h3>
        <label>Date :</label><input type="date" id="p-date" onchange="loadPointageDate()">
        <label>Début :</label><input type="time" id="p-start">
        <div style="display:flex; justify-content:space-between; margin:10px 0;"><b>Pauses :</b> <button class="btn-action" onclick="addPause()">+ Ajouter</button></div>
        <div id="p-pz-list"></div>
        <label>Fin :</label><input type="time" id="p-end">
        <label>Rapport :</label><textarea id="p-rapport" rows="4"></textarea>
        <button onclick="savePointage()" style="width:100%; padding:15px; background:var(--success); color:white; border:none; border-radius:10px; font-weight:bold;">ENREGISTRER</button>
        <button onclick="closeModals()" style="width:100%; background:none; border:none; color:gray; margin-top:10px;">Annuler</button>
    </div>
</div>

<div id="ed-modal" class="overlay">
    <div class="box">
        <h3 id="ed-title">Mission</h3>
        <div id="ed-hist-box" class="hidden"></div>
        <div id="ed-form">
            <input type="text" id="e-ch" placeholder="Chantier">
            <textarea id="e-txt" placeholder="Mission" rows="3"></textarea>
            <textarea id="e-mat" placeholder="Matériel (Jadiel/Nicola)" rows="2"></textarea>
            <label><input type="checkbox" id="e-dep"> Signaler au Dépôt</label>
            <div id="e-files" style="margin:10px 0;"></div>
            <input type="file" id="e-up" class="hidden" onchange="upFile(this)">
            <button onclick="document.getElementById('e-up').click()" style="width:100%; padding:8px; margin-bottom:10px;">📎 Ajouter Document</button>
            <button onclick="saveTask()" style="width:100%; padding:15px; background:var(--blue); color:white; border:none; border-radius:10px;">ENREGISTRER</button>
            <button onclick="delTask()" style="width:100%; border:none; color:red; background:none; margin-top:10px;">Supprimer</button>
        </div>
        <button onclick="closeModals()" style="width:100%; border:none; color:gray; background:none; margin-top:10px;">Fermer</button>
    </div>
</div>

<div id="recap-modal" class="overlay">
    <div class="box" style="max-width:600px;">
        <h3>Récapitulatif Heures (Secrétariat)</h3>
        <div id="recap-list"></div>
        <button onclick="closeModals()" style="width:100%; padding:12px; background:var(--blue); color:white; border:none; border-radius:10px;">Fermer</button>
    </div>
</div>

<script>
    firebase.initializeApp({ databaseURL: "https://rbf-transport-default-rtdb.europe-west1.firebasedatabase.app/" });
    const db = firebase.database();
    const CLOUD = "dixdmejal", PRESET = "rbf-preset";
    let curU = localStorage.getItem('rbf_u'), curW, curY = 2026, curK, currentFiles = [];

    function getW(d) { d = new Date(d); d.setHours(0,0,0,0); d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7); return 1 + Math.round(((d - new Date(d.getFullYear(), 0, 4)) / 864e5 - 3 + (new Date(d.getFullYear(), 0, 4).getDay() + 6) % 7) / 7); }
    curW = getW(new Date());

    function askCode(u) { let p = prompt("Code "+u); if(p==={admin:'2026',depot:'5555',interne:'1111',cedric:'2222',jadiel:'3333',nicola:'4444'}[u]){ localStorage.setItem('rbf_u', u); login(u); } }
    function login(u) { curU = u; document.getElementById('login-screen').classList.add('hidden'); document.getElementById('app-content').classList.remove('hidden'); document.getElementById('logout-btn').classList.remove('hidden'); if(u==='admin') document.getElementById('admin-tools').classList.remove('hidden'); if(['interne','cedric','depot','jadiel','nicola'].includes(u)) document.getElementById('btn-show-pointer').classList.remove('hidden'); db.ref('planning_v18').on('value', s => { window.data = s.val()||{}; render(); }); }
    function logout() { localStorage.removeItem('rbf_u'); location.reload(); }

    function closeModals() { document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); }

    // POINTAGES
    function openPointage() { document.getElementById('p-date').value = new Date().toISOString().split('T')[0]; loadPointageDate(); document.getElementById('p-modal').style.display='flex'; }
    function loadPointageDate() {
        let d = document.getElementById('p-date').value; document.getElementById('p-pz-list').innerHTML = "";
        db.ref(`pointages_v3/${d}/${curU}`).once('value', s => {
            let v = s.val()||{}; document.getElementById('p-start').value = v.start||""; document.getElementById('p-end').value = v.end||""; document.getElementById('p-rapport').value = v.rapport||"";
            if(v.pauses) v.pauses.forEach(p => addPause(p.s, p.e));
        });
    }
    function addPause(s="",e="") {
        let div = document.createElement('div'); div.className = 'pause-row';
        div.innerHTML = `<input type="time" class="ps" value="${s}"> <input type="time" class="pe" value="${e}"> <button onclick="this.parentElement.remove()" style="color:red;border:none;background:none;">X</button>`;
        document.getElementById('p-pz-list').appendChild(div);
    }
    function savePointage() {
        let pz = []; document.querySelectorAll('.pause-row').forEach(r => { let s=r.querySelector('.ps').value, e=r.querySelector('.pe').value; if(s&&e) pz.push({s,e}); });
        db.ref(`pointages_v3/${document.getElementById('p-date').value}/${curU}`).set({
            start: document.getElementById('p-start').value, end: document.getElementById('p-end').value, rapport: document.getElementById('p-rapport').value, pauses: pz
        }).then(() => { alert("Enregistré"); closeModals(); });
    }

    // CALCULS SECRETAIRE
    function viewAllPointages() {
        db.ref('pointages_v3').limitToLast(20).once('value', s => {
            let d = s.val()||{}, h = "";
            Object.keys(d).sort().reverse().forEach(date => {
                h += `<div style="background:#eee; padding:5px 10px; font-weight:bold;">${date}</div>`;
                Object.keys(d[date]).forEach(u => {
                    let p = d[date][u], net = (t2d(p.end)-t2d(p.start)) - (p.pauses?p.pauses.reduce((a,c)=>a+(t2d(c.e)-t2d(c.s)),0):0);
                    h += `<div class="recap-card"><span class="total-badge">${net.toFixed(2)}h</span><b>${u.toUpperCase()}</b><br><small>${p.start} > ${p.end}</small><p style="font-size:12px;">${p.rapport||''}</p></div>`;
                });
            });
            document.getElementById('recap-list').innerHTML = h; document.getElementById('recap-modal').style.display='flex';
        });
    }
    function t2d(t) { if(!t) return 0; let [h,m] = t.split(':').map(Number); return h + m/60; }

    // RENDU
    function render() {
        document.getElementById('wk-disp').innerText = `SEMAINE ${curW} - ${curY}`;
        let days = ["LUN","MAR","MER","JEU","VEN"];
        for(let i=0; i<5; i++) {
            let d = getD(curW, curY, i); document.getElementById('h'+i).innerHTML = `${days[i]}<br>${d.getDate()}/${d.getMonth()+1}`;
        }
        if(curU==='admin'||curU==='depot') {
            document.getElementById('v-admin').classList.remove('hidden'); document.getElementById('v-driver').classList.add('hidden');
            let rows = "", usrs = ['interne','externe','cedric','divers','instal','jadiel','nicola'];
            usrs.forEach(u => {
                rows += `<tr><td class="user-cell">${u.toUpperCase()}</td>`;
                for(let d=0; d<5; d++) {
                    rows += `<td>`;
                    for(let s=1; s<=4; s++) {
                        let k = `${curY}_${curW}_${u}_${d}_s${s}`, val = window.data[k];
                        if(curU==='depot' && (!val || !val.toDepot)) continue;
                        if(val) rows += `<div class="slot filled ${val.toDepot?'is-to-depot':''}" onclick="openEd('${k}')"><b>${val.ch||''}</b><br>${val.txt||''}</div>`;
                        else rows += `<div class="slot" onclick="openEd('${k}')"></div>`;
                    }
                    rows += `</td>`;
                }
                rows += `</tr>`;
            });
            document.getElementById('b-admin').innerHTML = rows;
        } else {
            let v = document.getElementById('v-driver'); v.classList.remove('hidden'); v.innerHTML = "";
            for(let d=0; d<5; d++) {
                let dayH = `<h3>${days[d]}</h3>`;
                for(let s=1; s<=4; s++) {
                    let val = window.data[`${curY}_${curW}_${curU}_${d}_s${s}`];
                    if(val) dayH += `<div style="background:white; padding:15px; margin-bottom:10px; border-left:5px solid var(--blue); border-radius:10px;"><b>${val.ch||''}</b><br>${val.txt||''}${val.mat?`<br><small>Matos: ${val.mat}</small>`:''}</div>`;
                }
                v.innerHTML += dayH;
            }
        }
    }

    function openEd(k) {
        curK = k; if(curU!=='admin' && curU!=='depot') return;
        let v = window.data[k]||{}; currentFiles = v.files||[];
        document.getElementById('e-ch').value = v.ch||""; document.getElementById('e-txt').value = v.txt||""; document.getElementById('e-mat').value = v.mat||""; document.getElementById('e-dep').checked = !!v.toDepot;
        document.getElementById('ed-form').classList.remove('hidden'); document.getElementById('ed-hist-box').classList.add('hidden');
        document.getElementById('ed-modal').style.display='flex';
    }

    function saveTask() {
        db.ref('planning_v18/'+curK).set({ ch: document.getElementById('e-ch').value, txt: document.getElementById('e-txt').value, mat: document.getElementById('e-mat').value, toDepot: document.getElementById('e-dep').checked, files: currentFiles }).then(()=>closeModals());
    }
    function delTask() { if(confirm("Supprimer?")) db.ref('planning_v18/'+curK).remove().then(()=>closeModals()); }

    function getD(w, y, i) { let s = new Date(y, 0, 1 + (w - 1) * 7); s.setDate(s.getDate() + (1 - s.getDay()) + i); return s; }
    function changeWeek(v) { curW += v; render(); }
    function applySearch() { let q = document.getElementById('search-input').value.toLowerCase(); document.querySelectorAll('.slot').forEach(s => s.classList.toggle('hidden', q && !s.innerText.toLowerCase().includes(q))); }
    
    function showFullHistory() {
        let q = document.getElementById('search-input').value.toLowerCase(); if(!q) return alert("Saisir un chantier");
        let h = ""; Object.keys(window.data).forEach(k => { let v = window.data[k]; if(v.ch && v.ch.toLowerCase().includes(q)) h += `<div style="padding:10px; border-bottom:1px solid #eee;"><b>${k}</b>: ${v.txt}</div>`; });
        document.getElementById('ed-hist-box').innerHTML = h || "Rien trouvé"; document.getElementById('ed-hist-box').classList.remove('hidden'); document.getElementById('ed-form').classList.add('hidden'); document.getElementById('ed-modal').style.display='flex';
    }

    if(curU) login(curU);
</script>
</body>
</html>
