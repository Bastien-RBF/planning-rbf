<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBF Planning V33</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --blue: #1b2e58; --yellow: #f9c311; --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7fa; margin: 0; }
        header { background: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--yellow); }
        .login-screen { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .grid-users { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; }
        .btn-user { padding: 15px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
        .table-container { padding: 10px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 1000px; border-radius: 10px; overflow: hidden; }
        th { background: var(--blue); color: white; padding: 12px; font-size: 12px; }
        th span { display: block; font-size: 10px; color: var(--yellow); }
        td { border: 1px solid #e2e8f0; padding: 8px; vertical-align: top; }
        .slot { font-size: 11px; padding: 10px; margin-bottom: 5px; border-radius: 6px; background: #f8fafc; border: 1px dashed #cbd5e1; cursor: pointer; min-height: 35px; }
        .filled { background: #eff6ff; border: 1px solid #3b82f6; font-weight: 600; color: var(--blue); }
        .is-to-depot { border-left: 5px solid var(--success); }
        .has-link { border-bottom: 3px solid #8b5cf6; }
        #editor-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index:9999; backdrop-filter: blur(4px); }
        .editor-box { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; }
        textarea { width: 100%; height: 100px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin: 10px 0; box-sizing: border-box; }
        .btn-file-trigger { background: #f1f5f9; color: #475569; border: 2px dashed #cbd5e1; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 15px; text-align: center; }
        .btn-save { background: var(--success); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-del { background: none; color: var(--danger); border: 1px solid var(--danger); padding: 8px; width: 100%; border-radius: 8px; margin-top: 10px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>
<header>
    <div style="font-weight:bold; color:var(--blue);">RBF TRANSPORT</div>
    <div id="u-disp" style="font-size:12px;"></div>
    <button onclick="logout()" style="background:var(--danger); color:white; border:none; padding:5px 10px; border-radius:5px;">X</button>
</header>

<div id="login" class="login-screen">
    <div class="grid-users">
        <button class="btn-user" style="background:var(--blue); grid-column: span 2;" onclick="askCode('admin')">💼 BUREAU</button>
        <button class="btn-user" style="background:var(--success); grid-column: span 2;" onclick="askCode('depot')">📦 DÉPÔT</button>
        <button class="btn-user" style="background:#3b82f6" onclick="askCode('damien')">🚛 DAMIEN</button>
        <button class="btn-user" style="background:#f59e0b" onclick="askCode('cedric')">🚛 CÉDRIC</button>
        <button class="btn-user" style="background:#8b5cf6" onclick="askCode('jadiel')">👷 JADIEL</button>
        <button class="btn-user" style="background:#64748b" onclick="askCode('nicola')">👷 NICOLA</button>
    </div>
</div>

<div id="app" class="hidden">
    <div style="text-align:center; padding:15px;">
        <button onclick="changeWeek(-1)">◀</button>
        <span id="wk-disp" style="font-weight:bold; margin:0 15px;"></span>
        <button onclick="changeWeek(1)">▶</button>
    </div>
    <div id="v-admin" class="table-container hidden">
        <table>
            <thead>
                <tr><th>NOM</th><th id="h0"></th><th id="h1"></th><th id="h2"></th><th id="h3"></th><th id="h4"></th></tr>
            </thead>
            <tbody id="b-admin"></tbody>
        </table>
    </div>
    <div id="v-driver" class="hidden"></div>
</div>

<div id="editor-overlay">
    <div class="editor-box">
        <h3 id="ed-title" style="margin-top:0;">Mission</h3>
        <div id="ed-view-only" class="hidden">
            <p id="txt-display" style="background:#f8fafc; padding:10px; border-radius:5px; border:1px solid #eee;"></p>
            <div id="link-display"></div>
        </div>
        <div id="ed-controls">
            <textarea id="e-input"></textarea>
            <input type="file" id="e-file" class="hidden" onchange="uploadFile(this)">
            <div id="btn-fake-file" class="btn-file-trigger" onclick="document.getElementById('e-file').click()">
                📎 CLIQUEZ ICI POUR AJOUTER UN FICHIER
            </div>
            <div id="file-status" style="display:none; color:var(--success); font-weight:bold; text-align:center; margin-bottom:10px;">✓ FICHIER PRÊT</div>
            <input type="hidden" id="e-link">
            <label style="display:block; margin-bottom:15px; color:var(--success); font-weight:bold;">
                <input type="checkbox" id="e-depot"> VISIBLE DÉPÔT
            </label>
            <button onclick="saveTask()" class="btn-save">ENREGISTRER</button>
            <button id="btn-del-ui" onclick="deleteTask()" class="btn-del">🗑️ SUPPRIMER</button>
        </div>
        <button onclick="closeEditor()" style="width:100%; background:none; border:none; padding:10px; color:#999; cursor:pointer;">FERMER</button>
    </div>
</div>

<script>
    const CLOUD_NAME = "dixdmejal"; 
    const UPLOAD_PRESET = "rbf-preset";

    firebase.initializeApp({ databaseURL: "https://rbf-transport-default-rtdb.europe-west1.firebasedatabase.app/" });
    const db = firebase.database();
    (function(){ emailjs.init("q2ZFtf0rJf0I0jLbq"); })();

    let curW = 16, curU = localStorage.getItem('rbf_u'), curK = null;
    const access = { admin:"2026", depot:"5555", damien:"1111", cedric:"2222", jadiel:"3333", nicola:"4444" };

    function askCode(u) {
        let p = prompt("Code " + u.toUpperCase());
        if (p === access[u]) { localStorage.setItem('rbf_u', u); login(u); }
    }

    function login(u) {
        curU = u;
        document.getElementById('login').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('u-disp').textContent = u.toUpperCase();
        db.ref('planning_v18').on('value', (s) => { window.data = s.val() || {}; render(); });
    }

    function logout() { localStorage.removeItem('rbf_u'); location.reload(); }

    function uploadFile(input) {
        if (!input.files[0]) return;
        const btn = document.getElementById('btn-fake-file');
        btn.textContent = "⌛ Chargement...";
        
        const fd = new FormData();
        fd.append('file', input.files[0]);
        fd.append('upload_preset', UPLOAD_PRESET);

        fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { method: 'POST', body: fd })
        .then(r => r.json())
        .then(d => {
            if(d.secure_url) {
                document.getElementById('e-link').value = d.secure_url;
                document.getElementById('file-status').style.display = 'block';
                btn.style.display = 'none';
            } else { alert("Erreur : " + d.error.message); btn.textContent = "📎 RÉESSAYER"; }
        });
    }

    function render() {
        document.getElementById('wk-disp').textContent = "SEMAINE " + curW;
        if (curU === 'admin' || curU === 'depot') {
            document.getElementById('v-admin').classList.remove('hidden');
            let h = "";
            const users = [{id:'damien',s:4,d:true},{id:'externe',s:4,d:true},{id:'cedric',s:4,d:true},{id:'divers',s:4,d:false},{id:'elec',s:4,d:false},{id:'jadiel',s:2,d:false},{id:'nicola',s:2,d:false}];
            users.forEach(u => {
                if (curU === 'depot' && !u.d) return;
                h += `<tr><td><b>${u.id.toUpperCase()}</b></td>`;
                for(let d=0; d<5; d++) {
                    h += `<td>`;
                    for(let s=1; s<=u.s; s++) {
                        let k = `${curW}_${u.id}_${d}_s${s}`, dta = window.data[k] || {text:""};
                        if (curU === 'depot' && !dta.toDepot) continue;
                        h += `<div class="slot ${dta.text?'filled':''} ${dta.link?'has-link':''}" onclick="openEd('${k}')">${dta.text || '...'}</div>`;
                    }
                    h += `</td>`;
                }
                h += `</tr>`;
            });
            document.getElementById('b-admin').innerHTML = h;
        }
    }

    function openEd(k) {
        curK = k; let d = window.data[k] || {text:"", link:"", toDepot:false};
        document.getElementById('file-status').style.display = 'none';
        document.getElementById('btn-fake-file').style.display = 'block';
        document.getElementById('btn-fake-file').textContent = "📎 AJOUTER UN FICHIER";
        
        if(curU === 'admin') {
            document.getElementById('ed-view-only').classList.add('hidden');
            document.getElementById('ed-controls').classList.remove('hidden');
            document.getElementById('e-input').value = d.text;
            document.getElementById('e-link').value = d.link;
            document.getElementById('e-depot').checked = !!d.toDepot;
        } else {
            document.getElementById('ed-controls').classList.add('hidden');
            document.getElementById('ed-view-only').classList.remove('hidden');
            document.getElementById('txt-display').textContent = d.text || "Vide";
            document.getElementById('link-display').innerHTML = d.link ? `<a href="${d.link}" target="_blank" style="display:block; background:var(--blue); color:white; padding:10px; border-radius:5px; text-align:center; text-decoration:none; margin-top:10px;">📄 VOIR LE DOCUMENT</a>` : '';
        }
        document.getElementById('editor-overlay').style.display = 'flex';
    }

    function closeEditor() { document.getElementById('editor-overlay').style.display = 'none'; }

    function saveTask() {
        let v = document.getElementById('e-input').value, l = document.getElementById('e-link').value, c = document.getElementById('e-depot').checked;
        db.ref('planning_v18/'+curK).set({text:v, link:l, toDepot:c});
        closeEditor();
    }

    function deleteTask() {
        if(confirm("Supprimer ?")) { db.ref('planning_v18/'+curK).remove(); closeEditor(); }
    }

    function changeWeek(v) { curW += v; render(); }
    if(curU) login(curU);
</script>
</body>
</html>
