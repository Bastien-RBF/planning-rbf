<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RBF - Planning Slots</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --rbf-blue: #1b2e58; --rbf-yellow: #f9c311; --grey-bg: #f4f7fa; --success: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--grey-bg); margin: 0; }
        
        header { 
            background: white; height: 60px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; 
            sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--rbf-yellow);
        }
        .header-logo { height: 35px; }

        /* Login */
        .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; padding: 20px; }
        .grid-users { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; }
        .btn-user { padding: 15px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }

        /* Table Admin */
        .table-container { padding: 10px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 1200px; }
        th { background: var(--rbf-blue); color: white; padding: 10px; font-size: 11px; border: 1px solid #ddd; }
        td { border: 1px solid #ddd; padding: 5px; vertical-align: top; width: 200px; }
        
        /* Cases de livraison (Slots) */
        .slot { 
            font-size: 11px; padding: 6px; margin-bottom: 4px; border-radius: 4px; 
            background: #f9fafb; border: 1px dashed #cbd5e1; cursor: pointer; min-height: 20px;
            transition: 0.2s; position: relative;
        }
        .slot:hover { border-color: var(--rbf-yellow); background: #fff; }
        .slot.filled { background: #eff6ff; border: 1px solid #3b82f6; color: var(--rbf-blue); font-weight: 600; }
        .slot.to-depot { border-left: 4px solid var(--success); }
        .slot-num { position: absolute; right: 4px; top: 2px; font-size: 8px; color: #94a3b8; }

        /* Vue Chauffeur */
        .driver-card { background: white; padding: 15px; border-radius: 12px; margin: 10px; border-left: 6px solid var(--rbf-blue); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .delivery-row { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid #eee; }
        .delivery-row:last-child { border: 0; }
        .delivery-index { background: var(--rbf-yellow); color: var(--rbf-blue); width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px; flex-shrink: 0; }

        /* Editor */
        #editor-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; z-index:1000; align-items:center; justify-content:center; }
        .editor-box { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; margin: 10px 0; box-sizing: border-box; }
        
        .hidden { display: none; }
        .row-name { font-weight: bold; font-size: 12px; background: #f1f5f9; position: sticky; left: 0; z-index: 5; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" class="header-logo" alt="RBF" onerror="this.src='https://via.placeholder.com/100x30?text=RBF'">
    <button onclick="location.reload()" style="background:none; border:1px solid #ddd; padding:5px; border-radius:5px; font-size:10px;">Quitter</button>
</header>

<div id="login" class="login-screen">
    <div class="grid-users">
        <button class="btn-user" style="background:var(--rbf-blue); grid-column: span 2;" onclick="askCode('admin')">💼 BUREAU</button>
        <button class="btn-user" style="background:var(--success); grid-column: span 2;" onclick="askCode('depot')">📦 DÉPÔT</button>
        <button class="btn-user" style="background:#3b82f6" onclick="askCode('damien')">🚛 DAMIEN</button>
        <button class="btn-user" style="background:#f59e0b" onclick="askCode('cedric')">🚛 CÉDRIC</button>
        <button class="btn-user" style="background:#8b5cf6" onclick="askCode('jadiel')">👷 JADIEL</button>
        <button class="btn-user" style="background:#64748b" onclick="askCode('nicola')">👷 NICOLA</button>
    </div>
</div>

<div id="app" class="hidden">
    <div style="display:flex; justify-content:center; align-items:center; gap:20px; padding:10px; background:white;">
        <button onclick="changeWeek(-1)" style="border:none; background:none; font-size:20px;">◀</button>
        <b id="week-display">Semaine 01</b>
        <button onclick="changeWeek(1)" style="border:none; background:none; font-size:20px;">▶</button>
    </div>

    <div id="view-admin" class="table-container hidden">
        <table>
            <thead>
                <tr>
                    <th style="position:sticky; left:0; z-index:10;">NOM</th>
                    <th id="th-0">Lundi</th><th id="th-1">Mardi</th><th id="th-2">Mercredi</th><th id="th-3">Jeudi</th><th id="th-4">Vendredi</th>
                </tr>
            </thead>
            <tbody id="admin-body"></tbody>
        </table>
    </div>
    <div id="view-driver" class="hidden"></div>
</div>

<div id="editor-overlay">
    <div class="editor-box">
        <h3 style="margin:0; color:var(--rbf-blue);">Mission <span id="slot-id-display"></span></h3>
        <input type="text" id="edit-text" placeholder="Ex: Livraison Dupont, Thonon">
        <label style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
            <input type="checkbox" id="edit-to-depot"> <b>Informer le Dépôt</b>
        </label>
        <div style="display:flex; gap:10px;">
            <button onclick="saveTask()" style="background:var(--success); color:white; border:none; padding:10px; border-radius:5px; flex:1;">Valider</button>
            <button onclick="closeEditor()" style="background:#94a3b8; color:white; border:none; padding:10px; border-radius:5px; flex:1;">Annuler</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://rbf-transport-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function getWeekNumber(d) {
        const start = new Date(2026, 0, 5); 
        const dayDiff = Math.floor((d - start) / 86400000);
        return Math.max(1, Math.floor(dayDiff / 7) + 1);
    }

    function getDateOfWeek(w, y, dIdx) {
        let res = new Date(2026, 0, 5);
        res.setDate(res.getDate() + ((w - 1) * 7) + dIdx);
        return res.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' });
    }
    
    let currentWeek = getWeekNumber(new Date());
    let currentUser = null;
    let currentEditKey = null;

    const users = ['damien', 'cedric', 'jadiel', 'nicola'];
    const userAccess = { admin:"2026", depot:"5555", damien:"1111", cedric:"2222", jadiel:"3333", nicola:"4444" };

    function askCode(user) {
        let pin = prompt("Code " + user.toUpperCase());
        if (pin === userAccess[user]) {
            currentUser = user;
            document.getElementById('login').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            db.ref('planning_slots').on('value', (snap) => { window.fullData = snap.val() || {}; render(); });
        }
    }

    function render() {
        document.getElementById('week-display').textContent = "Semaine " + currentWeek;
        for(let i=0; i<5; i++) document.getElementById('th-'+i).innerHTML = `<div>${getDateOfWeek(currentWeek, 2026, i)}</div>`;
        
        if (currentUser === 'admin' || currentUser === 'depot') renderAdmin();
        else renderDriver();
    }

    function renderAdmin() {
        document.getElementById('view-admin').classList.remove('hidden');
        const tbody = document.getElementById('admin-body');
        tbody.innerHTML = "";
        
        users.forEach(u => {
            let row = `<tr><td class="row-name">${u.toUpperCase()}</td>`;
            for (let d = 0; d < 5; d++) {
                row += `<td>`;
                for (let s = 1; s <= 4; s++) { // 4 cases par jour
                    let key = `${currentWeek}_${u}_${d}_${s}`;
                    let data = window.fullData[key] || { text: "", toDepot: false };
                    let display = (currentUser === 'depot' && !data.toDepot) ? "" : data.text;
                    
                    row += `<div class="slot ${display?'filled':''} ${data.toDepot?'to-depot':''}" 
                                 onclick="${currentUser==='admin'?`openEditor('${key}',${s})`:''}">
                                <span class="slot-num">${s}</span>
                                ${display || '...'}
                            </div>`;
                }
                row += `</td>`;
            }
            tbody.innerHTML += row + `</tr>`;
        });
    }

    function renderDriver() {
        const view = document.getElementById('view-driver');
        view.classList.remove('hidden'); view.innerHTML = "";
        const days = ["LUNDI", "MARDI", "MERCREDI", "JEUDI", "VENDREDI"];
        
        for (let d = 0; d < 5; d++) {
            let cardContent = "";
            let hasAny = false;
            for (let s = 1; s <= 4; s++) {
                let key = `${currentWeek}_${currentUser}_${d}_${s}`;
                let data = window.fullData[key];
                if (data && data.text) {
                    hasAny = true;
                    cardContent += `<div class="delivery-row">
                        <div class="delivery-index">${s}</div>
                        <div style="font-weight:600; font-size:15px;">${data.text}</div>
                    </div>`;
                }
            }
            view.innerHTML += `<div class="driver-card">
                <div style="font-weight:800; color:var(--rbf-blue); font-size:12px; margin-bottom:10px;">
                    ${days[d]} ${getDateOfWeek(currentWeek, 2026, d)}
                </div>
                ${hasAny ? cardContent : '<div style="color:#94a3b8; font-style:italic; font-size:13px;">Aucune mission</div>'}
            </div>`;
        }
    }

    function openEditor(key, slotNum) {
        currentEditKey = key;
        document.getElementById('slot-id-display').textContent = "#" + slotNum;
        let data = window.fullData[key] || { text: "", toDepot: false };
        document.getElementById('edit-text').value = data.text;
        document.getElementById('edit-to-depot').checked = data.toDepot;
        document.getElementById('editor-overlay').style.display = 'flex';
    }

    function saveTask() {
        let txt = document.getElementById('edit-text').value;
        let check = document.getElementById('edit-to-depot').checked;
        if (txt.trim() === "") db.ref('planning_slots/' + currentEditKey).remove();
        else db.ref('planning_slots/' + currentEditKey).set({ text: txt, toDepot: check });
        closeEditor();
    }

    function closeEditor() { document.getElementById('editor-overlay').style.display = 'none'; }
    function changeWeek(v) { currentWeek = Math.max(1, currentWeek + v); render(); }
</script>
</body>
</html>
