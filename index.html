<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RBF Planning V86 - Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #1b2e58; --yellow: #f9c311; --success: #10b981; --danger: #ef4444; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        header { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--yellow); sticky; top:0; z-index:100; }
        .btn-top { background: var(--blue); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .week-nav { display: flex; align-items: center; justify-content: center; gap: 20px; padding: 15px; background: white; border-bottom: 1px solid #ddd; }
        .wk-btn { padding: 10px 20px; border-radius: 8px; border: 1px solid #ccc; cursor: pointer; font-weight: bold; }
        
        /* TABLEAU PRINCIPAL */
        .table-container { padding: 10px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; min-width: 900px; }
        th { background: var(--blue); color: white; padding: 12px; font-size: 11px; }
        td { border: 1px solid #eee; padding: 8px; vertical-align: top; width: 150px; }
        .user-cell { background: #f8fafc; font-weight: bold; color: var(--blue); position: sticky; left: 0; z-index: 2; border-right: 3px solid var(--yellow); width: 100px; text-align: center; }
        .ferie { background: #dfe6e9 !important; color: #636e72; text-align: center; font-size: 10px; font-weight: bold; }
        
        /* SLOTS MISSIONS */
        .slot { background: #f9f9f9; border: 1px dashed #ccc; padding: 8px; margin-bottom: 5px; border-radius: 6px; font-size: 11px; cursor: pointer; min-height: 35px; }
        .slot.filled { background: #e3f2fd; border: 1px solid #2196f3; font-weight: bold; }
        .is-mat { border-left: 5px solid var(--danger) !important; }

        /* MODAL DASHBOARD POINTAGE */
        #dash-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index: 2000; display:none; flex-direction: column; overflow-y: auto; }
        .dash-header { padding: 20px; background: var(--blue); color: white; display: flex; justify-content: space-between; align-items: center; }
        .dash-table { width: 100%; border-collapse: collapse; }
        .dash-table th { position: sticky; top: 0; background: #34495e; }
        .dash-table td { padding: 12px; border-bottom: 1px solid #eee; font-size: 12px; width: auto; }

        /* VUE CHAUFFEUR/MACON */
        .card-pointage { background: white; margin: 15px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .input-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; color: var(--blue);">RBF TRANSPORT & MAÇONNERIE</div>
    <div id="admin-btns" class="hidden">
        <button class="btn-top" onclick="toggleDash()">📊 VOIR TOUS LES POINTAGES</button>
        <button class="btn-top" onclick="logout()" style="background:var(--danger)">QUITTER</button>
    </div>
</header>

<div id="login-screen" style="padding: 50px 20px; text-align: center;">
    <h2 style="color:var(--blue)">Connexion</h2>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 400px; margin: auto;">
        <button class="btn-top" onclick="askCode('admin')" style="grid-column: span 2; padding: 20px;">💼 BUREAU / CONDUC (2026)</button>
        <button class="btn-top" onclick="askCode('damien')">🚛 DAMIEN</button>
        <button class="btn-top" onclick="askCode('cedric')">🚛 CÉDRIC</button>
        <button class="btn-top" onclick="askCode('jadiel')" style="background:var(--success)">👷 JADIEL</button>
        <button class="btn-top" onclick="askCode('nicola')" style="background:var(--success)">👷 NICOLA</button>
    </div>
</div>

<div id="dash-overlay">
    <div class="dash-header">
        <h2>TABLEAU DE BORD POINTAGES (Vue Secrétaire)</h2>
        <button onclick="toggleDash()" style="padding: 10px; background: var(--yellow); border:none; font-weight:bold; border-radius:5px;">RETOUR AU PLANNING</button>
    </div>
    <div style="padding: 20px;">
        <table class="dash-table">
            <thead>
                <tr>
                    <th>DATE / SEMAINE</th>
                    <th>NOM</th>
                    <th>DÉBUT</th>
                    <th>FIN</th>
                    <th>PAUSE</th>
                    <th>TOTAL</th>
                    <th>RAPPORT DE MISSION</th>
                </tr>
            </thead>
            <tbody id="dash-body">
                </tbody>
        </table>
    </div>
</div>

<div id="app-content" class="hidden">
    <div class="week-nav">
        <button class="wk-btn" onclick="changeWeek(-1)">◀</button>
        <div id="wk-disp" style="text-align: center; font-weight: bold; color: var(--blue);"></div>
        <button class="wk-btn" onclick="changeWeek(1)">▶</button>
    </div>

    <div id="v-admin" class="table-container hidden">
        <table>
            <thead>
                <tr id="head-days">
                    <th class="user-cell">PERSONNEL</th>
                    <th>LUNDI</th><th>MARDI</th><th>MERCREDI</th><th>JEUDI</th><th>VENDREDI</th>
                </tr>
            </thead>
            <tbody id="b-admin"></tbody>
        </table>
    </div>

    <div id="v-user" class="hidden"></div>
</div>

<script>
    firebase.initializeApp({ databaseURL: "https://rbf-transport-default-rtdb.europe-west1.firebasedatabase.app/" });
    const db = firebase.database();

    let curU = localStorage.getItem('rbf_u');
    let curW = 16, curY = 2026; // Par défaut avril 2026
    const users = [
        {id:'damien', display:'DAMIEN (Chauffeur)', s:4},
        {id:'cedric', display:'CÉDRIC (Chauffeur)', s:4},
        {id:'jadiel', display:'JADIEL (Maçon)', s:2},
        {id:'nicola', display:'NICOLA (Maçon)', s:2},
        {id:'divers', display:'DIVERS / INTERNE', s:4}
    ];

    const feries2026 = ["2026-01-01", "2026-04-06", "2026-05-01", "2026-05-08", "2026-05-14", "2026-05-25", "2026-07-14", "2026-08-15", "2026-11-01", "2026-11-11", "2026-12-25"];

    function askCode(u) {
        let p = prompt("Code pour " + u.toUpperCase());
        let codes = {admin:'2026', damien:'1111', cedric:'2222', jadiel:'3333', nicola:'4444'};
        if(p === codes[u]) { localStorage.setItem('rbf_u', u); location.reload(); }
    }

    function logout() { localStorage.removeItem('rbf_u'); location.reload(); }

    function getDatesOfWeek(w, y) {
        let d = new Date(y, 0, 1 + (w - 1) * 7);
        let day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6:1);
        let mon = new Date(d.setDate(diff));
        let res = [];
        for(let i=0; i<5; i++) {
            let next = new Date(mon); next.setDate(mon.getDate() + i);
            res.push(next.toISOString().split('T')[0]);
        }
        return res;
    }

    function calculateTotal(s, e, p) {
        if(!s || !e) return "-";
        let [h1, m1] = s.split(':').map(Number);
        let [h2, m2] = e.split(':').map(Number);
        let diff = (h2*60 + m2) - (h1*60 + m1);
        let pause = parseInt(p) || 0;
        let totalMin = diff - pause;
        return (totalMin/60).toFixed(2) + "h";
    }

    function render() {
        const dates = getDatesOfWeek(curW, curY);
        document.getElementById('wk-disp').innerHTML = `SEMAINE ${curW} - ${curY}`;
        
        if(curU === 'admin') {
            document.getElementById('v-admin').classList.remove('hidden');
            let h = "";
            users.forEach(u => {
                h += `<tr><td class="user-cell">${u.display}</td>`;
                dates.forEach((date, i) => {
                    let isF = feries2026.includes(date);
                    h += `<td class="${isF?'ferie':''}">`;
                    if(isF) h += "FÉRIÉ";
                    else {
                        for(let s=1; s<=u.s; s++) {
                            let key = `${date}_${u.id}_s${s}`;
                            let dta = window.planData ? window.planData[key] : null;
                            h += `<div class="slot ${dta?'filled':''}" onclick="editTask('${key}')">${dta ? dta.chantier : '+'}</div>`;
                        }
                    }
                    h += `</td>`;
                });
                h += `</tr>`;
            });
            document.getElementById('b-admin').innerHTML = h;
        } else {
            // Vue Employé simplifiée
            document.getElementById('v-user').classList.remove('hidden');
            let h = "";
            dates.forEach((date, i) => {
                let p = (window.pointData && window.pointData[date+'_'+curU]) ? window.pointData[date+'_'+curU] : {s:'', e:'', p:'45', r:''};
                h += `<div class="card-pointage">
                    <h3 style="margin:0; color:var(--blue);">${date}</h3>
                    <div class="input-group" style="margin-top:10px;">
                        <div><label>Début</label><input type="time" value="${p.s}" onchange="saveP('${date}','s',this.value)"></div>
                        <div><label>Fin</label><input type="time" value="${p.e}" onchange="saveP('${date}','e',this.value)"></div>
                        <div><label>Pause (min)</label><input type="number" value="${p.p}" onchange="saveP('${date}','p',this.value)"></div>
                    </div>
                    <textarea placeholder="Travaux réalisés / Rapport..." onblur="saveP('${date}','r',this.value)">${p.r}</textarea>
                    <div style="text-align:right; font-weight:bold; color:var(--success);">Total : ${calculateTotal(p.s, p.e, p.p)}</div>
                </div>`;
            });
            document.getElementById('v-user').innerHTML = h;
        }
    }

    function saveP(date, field, val) {
        db.ref(`pointages_v86/${date}_${curU}/${field}`).set(val);
    }

    function editTask(key) {
        if(curU !== 'admin') return;
        let c = prompt("Nom du chantier ?");
        if(c !== null) db.ref(`planning_v86/${key}/chantier`).set(c);
    }

    function toggleDash() {
        let el = document.getElementById('dash-overlay');
        if(el.style.display === 'flex') {
            el.style.display = 'none';
        } else {
            el.style.display = 'flex';
            loadFullDash();
        }
    }

    function loadFullDash() {
        const body = document.getElementById('dash-body');
        body.innerHTML = "Chargement...";
        db.ref('pointages_v86').once('value', s => {
            let data = s.val();
            let h = "";
            if(!data) { body.innerHTML = "Aucun pointage."; return; }
            
            // On trie par date inverse (plus récent en haut)
            let keys = Object.keys(data).sort().reverse();
            keys.forEach(k => {
                let [date, user] = k.split('_');
                let p = data[k];
                h += `<tr>
                    <td><b>${date}</b></td>
                    <td style="text-transform:uppercase">${user}</td>
                    <td>${p.s || '-'}</td>
                    <td>${p.e || '-'}</td>
                    <td>${p.p || '0'}m</td>
                    <td style="color:var(--success); font-weight:bold;">${calculateTotal(p.s, p.e, p.p)}</td>
                    <td style="font-style:italic;">${p.r || ''}</td>
                </tr>`;
            });
            body.innerHTML = h;
        });
    }

    function changeWeek(v) { curW += v; render(); }

    if(curU) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app-content').classList.remove('hidden');
        if(curU === 'admin') document.getElementById('admin-btns').classList.remove('hidden');
        
        db.ref('planning_v86').on('value', s => { window.planData = s.val(); render(); });
        db.ref('pointages_v86').on('value', s => { window.pointData = s.val(); render(); });
    }
</script>
</body>
</html>
