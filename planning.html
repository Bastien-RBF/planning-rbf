<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBF Planning Flux Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --blue: #1e3a8a; --grey: #f3f4f6; --border: #d1d5db; --text: #1f2937; --green: #059669; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--grey); margin: 0; padding-bottom: 50px; }
        
        header { background: var(--blue); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logout-btn { background: #dc2626; border: none; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        /* Menu de connexion */
        .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 90vh; padding: 20px; }
        .grid-users { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 400px; margin-top: 10px; }
        .btn-user { padding: 18px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        /* Planning */
        .week-picker { background: white; padding: 15px; display: flex; justify-content: center; align-items: center; gap: 20px; border-bottom: 2px solid var(--blue); }
        .nav-btn { background: var(--blue); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .table-container { padding: 15px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 1100px; border-radius: 8px; overflow: hidden; }
        th, td { border: 1px solid var(--border); padding: 10px; vertical-align: top; }
        th { background: #e5e7eb; font-size: 11px; text-transform: uppercase; }
        .row-cat { background: #f8fafc; font-weight: bold; font-size: 12px; color: #64748b; padding: 5px 10px; border-left: 4px solid #64748b; }
        
        .task-content { white-space: pre-wrap; word-wrap: break-word; font-size: 13px; line-height: 1.4; color: #1e40af; font-weight: 600; }
        .depot-tag { display: inline-block; background: var(--green); color: white; font-size: 9px; padding: 2px 5px; border-radius: 4px; margin-top: 5px; }
        .empty-cell { color: #ccc; font-style: italic; font-size: 11px; }

        /* Modal Editeur */
        #editor-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; z-index:1000; align-items:center; justify-content:center; }
        .editor-box { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 450px; }
        textarea { width: 100%; height: 140px; margin: 15px 0; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 15px; resize: none; box-sizing: border-box; }
        
        .check-container { display: flex; align-items: center; gap: 10px; background: #f0fdf4; padding: 10px; border-radius: 8px; border: 1px solid #bcf0da; margin-bottom: 15px; cursor: pointer; }
        .check-container input { width: 20px; height: 20px; cursor: pointer; }

        .driver-card { background: white; padding: 20px; border-radius: 15px; border-left: 10px solid var(--blue); margin: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div id="header-title" style="font-weight:bold;">RBF TRANSPORT</div>
    <button id="logout" class="logout-btn hidden" onclick="location.reload()">DÉCONNEXION</button>
</header>

<div id="login" class="login-screen">
    <h2 style="color:var(--blue); margin-bottom:20px;">Accès Planning</h2>
    <button class="btn-user" style="background:#111827; width:100%; max-width:400px; margin-bottom:10px;" onclick="askCode('admin')">💼 BUREAU / EXPLOITATION</button>
    <button class="btn-user" style="background:#059669; width:100%; max-width:400px; margin-bottom:20px;" onclick="askCode('depot')">📦 DÉPÔT (Préparation)</button>
    
    <div class="grid-users">
        <button class="btn-user" style="background:#2563eb" onclick="askCode('damien')">🚛 DAMIEN</button>
        <button class="btn-user" style="background:#d97706" onclick="askCode('cedric')">🚛 CÉDRIC</button>
        <button class="btn-user" style="background:#7c3aed" onclick="askCode('jadiel')">👷 JADIEL</button>
        <button class="btn-user" style="background:#4b5563" onclick="askCode('nicola')">👷 NICOLA</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="week-picker">
        <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
        <b id="week-display" style="font-size: 18px; min-width: 140px; text-align:center;">Semaine 03</b>
        <button class="nav-btn" onclick="changeWeek(1)">›</button>
    </div>

    <div id="view-admin" class="table-container hidden">
        <table>
            <thead>
                <tr>
                    <th style="width:140px; position:sticky; left:0; background:#eee;">RESSOURCE</th>
                    <th>LUNDI</th><th>MARDI</th><th>MERCREDI</th><th>JEUDI</th><th>VENDREDI</th>
                </tr>
            </thead>
            <tbody id="admin-body"></tbody>
        </table>
    </div>
    <div id="view-driver" class="hidden"></div>
</div>

<div id="editor-overlay">
    <div class="editor-box">
        <h3 id="edit-title" style="margin:0; color:var(--blue);">Détails Mission</h3>
        <textarea id="edit-text" placeholder="CHANTIER - Ville&#10;- Liste matériel..."></textarea>
        
        <label class="check-container">
            <input type="checkbox" id="edit-to-depot">
            <span style="font-weight:bold; color:var(--green);">Envoyer au DÉPÔT ?</span>
        </label>

        <div style="display:flex; gap:10px;">
            <button class="btn-user" style="background:var(--green); flex:1;" onclick="saveTask()">VALIDER</button>
            <button class="btn-user" style="background:#999; flex:1;" onclick="closeEditor()">ANNULER</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://rbf-transport-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentWeek = 3;
    let currentUser = null;
    let currentKey = null;

    const userAccess = {
        admin:  { code: "2026", role: "manager" },
        depot:  { code: "5555", role: "depot" },
        damien: { code: "1111", role: "driver" },
        cedric: { code: "2222", role: "driver" },
        jadiel: { code: "3333", role: "driver" },
        nicola: { code: "4444", role: "driver" }
    };

    function askCode(user) {
        let codeInput = prompt("Code secret pour " + user.toUpperCase() + " :");
        if (codeInput === userAccess[user].code) startApp(user);
        else alert("Code incorrect !");
    }

    function startApp(user) {
        currentUser = user;
        document.getElementById('login').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('logout').classList.remove('hidden');
        document.getElementById('header-title').textContent = "RBF : " + user.toUpperCase();
        db.ref('planning').on('value', (snap) => { window.fullData = snap.val() || {}; render(); });
    }

    function render() {
        document.getElementById('week-display').textContent = "Semaine " + (currentWeek < 10 ? '0'+currentWeek : currentWeek);
        if (userAccess[currentUser].role === 'manager' || userAccess[currentUser].role === 'depot') renderTable();
        else renderDriver();
    }

    function renderTable() {
        document.getElementById('view-admin').classList.remove('hidden');
        const tbody = document.getElementById('admin-body');
        tbody.innerHTML = "";

        // Définition des lignes par catégorie
        const structure = [
            { label: "CHAUFFEURS", ids: ['damien', 'cedric'] },
            { label: "MAÇONNERIE", ids: ['jadiel', 'nicola'], hideFromDepot: true },
            { label: "AUTRES", ids: ['elec', 'divers', 'externe'] }
        ];

        structure.forEach(cat => {
            if (currentUser === 'depot' && cat.hideFromDepot) return;
            tbody.innerHTML += `<tr><td colspan="6" class="row-cat">${cat.label}</td></tr>`;
            
            cat.ids.forEach(id => {
                let row = `<tr><td style="font-weight:bold; background:#fff; position:sticky; left:0; border-right:2px solid #ddd;">${id.toUpperCase()}</td>`;
                for (let d = 0; d < 5; d++) {
                    let key = `${currentWeek}_${id}_${d}`;
                    let data = window.fullData[key] || { text: "", toDepot: false };
                    
                    // Si on est le Dépôt, on masque si non coché
                    let content = data.text;
                    if (currentUser === 'depot' && !data.toDepot) content = "";

                    row += `<td onclick="${currentUser === 'admin' ? `openEditor('${key}')` : ''}">
                                <div class="task-content">${content || '<span class="empty-cell">...</span>'}</div>
                                ${data.toDepot && content ? '<span class="depot-tag">Dépôt</span>' : ''}
                            </td>`;
                }
                tbody.innerHTML += row + `</tr>`;
            });
        });
    }

    function renderDriver() {
        const view = document.getElementById('view-driver');
        view.classList.remove('hidden'); view.innerHTML = "";
        const days = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi"];
        for (let d = 0; d < 5; d++) {
            let key = `${currentWeek}_${currentUser}_${d}`;
            let data = window.fullData[key] || { text: "Aucune mission prévue" };
            view.innerHTML += `<div class="driver-card"><span style="color:var(--blue); font-weight:bold; font-size:11px;">${days[d].toUpperCase()}</span><div class="task-content" style="margin-top:10px; font-size:16px;">${data.text}</div></div>`;
        }
    }

    function openEditor(key) {
        currentKey = key;
        let data = window.fullData[key] || { text: "", toDepot: false };
        document.getElementById('edit-text').value = data.text;
        document.getElementById('edit-to-depot').checked = data.toDepot;
        document.getElementById('editor-overlay').style.display = 'flex';
    }

    function saveTask() {
        let txt = document.getElementById('edit-text').value;
        let check = document.getElementById('edit-to-depot').checked;
        if (txt.trim() === "") db.ref('planning/' + currentKey).remove();
        else db.ref('planning/' + currentKey).set({ text: txt, toDepot: check });
        document.getElementById('editor-overlay').style.display = 'none';
    }

    function closeEditor() { document.getElementById('editor-overlay').style.display = 'none'; }
    function changeWeek(v) { currentWeek = Math.max(1, Math.min(52, currentWeek + v)); render(); }
</script>
</body>
</html>
